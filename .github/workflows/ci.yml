name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check powerbi_agent tests mcp_server_powerbi.py cli.py
      - name: Unit tests (không cần Power BI Desktop)
        run: pytest tests -m "not integration" -v
